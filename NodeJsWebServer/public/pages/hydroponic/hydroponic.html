<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydroponik</title>
  <link rel="stylesheet" href="pages/style.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container">
    <h1>Hydroponik Steuerung</h1>

    <section>
      <h2>MQTT Befehl senden</h2>
      <form id="mqtt-form">
        <label for="mqtt-topic">Topic</label>
        <input id="mqtt-topic" type="text" placeholder="hydroponic/pump" required>

        <label for="mqtt-payload">Payload</label>
        <input id="mqtt-payload" type="text" placeholder="on | off">

        <button id="mqtt-send" type="submit">Senden</button>
      </form>

      <p id="mqtt-status"></p>
    </section>
  </main>

  <script src="/pages/main.js"></script>
  <script src="/pages/hydroponic/hydroponic.js"></script>
</body>
</html>
